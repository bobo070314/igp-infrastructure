# IGP 国际集团 — Docker Compose 部署方案
#
# 对标：OpenClaw "一台Ubuntu + Docker长期运行"
# 方案：docker-compose.yml + .env + 生产级安全加固
#
# 服务构成：
#   openclaw-gateway  → 主 Gateway（端口 18791，国际版）
#   igp-api           → IGP HTTP API + 硅胶体记忆（端口 8080）
#   cloudflared       → Cloudflare Tunnel（可选，见 cloudflare/）
#   postgres          → 记忆持久化（可选，生产环境）
#   metamcp           → MCP 聚合代理（可选，见 metamcp/）
#
# 使用方式：
#   docker compose up -d                    # 启动全部服务
#   docker compose exec openclaw-gateway openclaw onboard  # 首次配置
#   docker compose logs -f                  # 查看日志
#   docker compose down                     # 停止

version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ====================================================================
  # 1. 主 Gateway — 集团总部神经中枢
  # ====================================================================
  openclaw-gateway:
    image: openclaw/openclaw:latest
    container_name: igp-gateway
    restart: unless-stopped
    # 生产建议：固定 tag，不要用 latest
    # image: openclaw/openclaw:2026.7.1
    ports:
      # 只绑定 127.0.0.1，不暴露公网
      - "127.0.0.1:18791:18789"
    environment:
      - NODE_ENV=production
      # Gateway Token — 来自 .env
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:?err}
      # 模型 API Key
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?err}
      # 可选 fallback
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      # 状态持久化 — 指向宿主机 data 目录
      - ./data/gateway:/home/node/.openclaw
      # 配置文件
      - ./config/openclaw.json:/app/openclaw.json:ro
      # 工作区
      - ./workspace:/workspace
    shm_size: "1gb"
    mem_limit: "4g"
    mem_reservation: "2g"
    cpus: "2.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "openclaw.mjs", "gateway", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "node:node"

  # ====================================================================
  # 2. IGP API — 自研 HTTP API + 硅胶体记忆
  # ====================================================================
  igp-api:
    build:
      context: .
      dockerfile: Dockerfile.igp-api
    container_name: igp-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./data/igp:/app/data
      # 映射 IGP 代码
      - ../../family-corp-teams/v5/v6:/app/v6:ro
    mem_limit: "1g"
    mem_reservation: "512m"
    cpus: "1.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "node:node"

  # ====================================================================
  # 3. Cloudflare Tunnel — 园区围墙（可选）
  # 启用方式: 设置 CF_TUNNEL_TOKEN 环境变量
  # ====================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: igp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:-}
    profiles:
      - tunnel
    mem_limit: "128m"
    cpus: "0.25"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ====================================================================
  # 4. PostgreSQL — 生产级持久化（可选）
  # ====================================================================
  postgres:
    image: postgres:16-alpine
    container_name: igp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-igp}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?err}
      POSTGRES_DB: ${PG_DB:-igp_memory}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    profiles:
      - prod
    mem_limit: "512m"
    cpus: "1.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-igp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================================================================
  # 5. MetaMCP — MCP 聚合代理（可选）
  # ====================================================================
  metamcp:
    image: metamcp/metamcp:latest
    container_name: igp-metamcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:12008:12008"
    environment:
      - MCP_ENDPOINT=http://igp-api:8080/mcp
    profiles:
      - full
    mem_limit: "256m"
    cpus: "0.5"
    logging: *default-logging
    depends_on:
      igp-api:
        condition: service_healthy

volumes:
  gateway-state:
  igp-data:
  pg-data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
